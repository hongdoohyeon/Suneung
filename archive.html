    <div class="container curriculum-nav__inner">

      <div class="nav-group">
        <div class="nav-group__tabs">
          <button class="nav-tab is-active" data-tab="senior">
            <span class="nav-tab__title">고3</span>
            <span class="nav-tab__sub">수능·평가원·학평</span>
          </button>
          <button class="nav-tab" data-tab="mp">
            <span class="nav-tab__title">사관·경찰</span>
            <span class="nav-tab__sub">1차 시험</span>
          </button>
          <button class="nav-tab" data-tab="gradschool">
            <span class="nav-tab__title">LEET·MEET</span>
            <span class="nav-tab__sub">전문대학원</span>
          </button>
        </div>
      </div>

      <div class="nav-sep" aria-hidden="true"></div>

      <div class="nav-group">
        <div class="nav-group__tabs">
          <button class="nav-tab" data-tab="junior">
            <span class="nav-tab__title">고2</span>
            <span class="nav-tab__sub">학력평가</span>
          </button>
          <button class="nav-tab" data-tab="freshman">
            <span class="nav-tab__title">고1</span>
            <span class="nav-tab__sub">학력평가</span>
          </button>
          <button class="nav-tab is-placeholder" data-tab="essay">
            <span class="nav-tab__title">논술</span>
            <span class="nav-tab__sub">준비 중</span>
          </button>
        </div>
      </div>

    </div>

  <!-- ── Main ───────────────────────────────────────────── -->
  <main class="container main">

    <!-- Sidebar / Mobile Bottom Sheet -->
    <aside class="filter" id="filterPanel" aria-label="필터" role="region">

      <!-- 모바일 바텀시트 핸들 + 닫기 (데스크톱에서는 숨김) -->
      <div class="filter__sheet-head" aria-hidden="false">
        <span class="filter__sheet-handle" aria-hidden="true"></span>
        <h2 class="filter__sheet-title">필터</h2>
        <button class="filter__sheet-close" id="filterSheetClose"
                type="button" aria-label="필터 닫기">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6"  x2="6"  y2="18"/>
            <line x1="6"  y1="6"  x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="filter__section" id="typeGroupBlock">
        <h3 class="filter__title">시험</h3>
        <div class="pill-row" id="typeGroupFilter"></div>
        <div class="subtype-row" id="subtypeRow">
          <div class="subtype-row__inner">
            <div class="pill-row" id="typeFilter"></div>
          </div>
        </div>
      </div>

      <div class="filter__section">
        <div class="filter__title-row">
          <h3 class="filter__title" id="yearLabel">학년도</h3>
          <span class="filter__hint" id="yearNote"></span>
        </div>
        <div class="year-row" id="yearFilter"></div>
      </div>

      <div class="filter__section">
        <h3 class="filter__title">영역</h3>
        <div id="subjectFilter"></div>
      </div>

      <!-- 모바일 시트 하단 적용 버튼 -->
      <div class="filter__sheet-actions">
        <button class="btn btn--ghost" id="filterSheetReset" type="button">초기화</button>
        <button class="btn btn--primary" id="filterSheetApply" type="button">결과 보기</button>
      </div>

    </aside>

    <!-- Backdrop (모바일 시트 전용) -->
    <div class="filter-backdrop" id="filterBackdrop" hidden></div>

    <!-- Content -->
    <section class="content">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search">
          <svg class="search__icon" width="16" height="16" viewBox="0 0 20 20" fill="none">
            <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.6"/>
            <path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <input id="searchInput" type="text" placeholder="과목·연도로 검색" autocomplete="off" />
          <button id="clearSearch" class="search__clear" style="display:none" aria-label="검색 지우기">×</button>
        </div>
        <button class="btn btn--ghost filter-toggle-inline" id="filterToggleInline"
                aria-label="필터 열기" aria-expanded="false" type="button">필터</button>
        <div class="toolbar__right">
          <span id="resultCount" class="count"></span>
          <button class="btn-text" id="resetBtn">초기화</button>
        </div>
      </div>

      <!-- Active Tags -->
      <div id="activeTags" class="active-tags"></div>

      <!-- 회차 단위 진입 (filter가 (curriculum, gradeYear, type) 까지 좁혀졌을 때 표시) -->
      <a id="examSetLink" class="examset-link" hidden href="exam-set.html">
        <span class="examset-link__icon" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
        </span>
        <span class="examset-link__label">이 회차 모든 영역 한 페이지에서 보기</span>
        <span class="examset-link__arrow" aria-hidden="true">→</span>
      </a>

      <!-- Skeleton -->
      <div id="skeleton" class="grid">
        <div class="skel-card"></div><div class="skel-card"></div>
        <div class="skel-card"></div><div class="skel-card"></div>
        <div class="skel-card"></div><div class="skel-card"></div>
      </div>

      <!-- Cards -->
      <div id="cardsGrid" class="grid" style="display:none;"></div>

      <!-- Pagination -->
      <div id="paginationWrap" class="pagination-wrap" style="display:none;"></div>

      <!-- 광고: 결과 그리드 하단 -->
      <div class="ad-slot ad-slot--banner" data-ad-position="archiveBottom"></div>

      <!-- Empty -->
      <div id="emptyState" class="empty" style="display:none;" role="status" aria-live="polite">
        <div class="empty__illu" aria-hidden="true">
          <svg width="120" height="96" viewBox="0 0 120 96" fill="none">
            <!-- 빈 문서 배경 -->
            <rect x="22" y="14" width="58" height="72" rx="6"
                  fill="var(--surface-2)" stroke="var(--line-strong)" stroke-width="1.4"/>
            <line x1="32" y1="32" x2="68" y2="32" stroke="var(--ink-6)" stroke-width="1.6" stroke-linecap="round"/>
            <line x1="32" y1="42" x2="62" y2="42" stroke="var(--ink-6)" stroke-width="1.6" stroke-linecap="round"/>
            <line x1="32" y1="52" x2="58" y2="52" stroke="var(--ink-6)" stroke-width="1.6" stroke-linecap="round"/>
            <!-- 돋보기 -->
            <circle cx="78" cy="64" r="18"
                    fill="var(--surface)" stroke="var(--ink-3)" stroke-width="2.2"/>
            <line x1="91" y1="77" x2="104" y2="90"
                  stroke="var(--ink-3)" stroke-width="3" stroke-linecap="round"/>
            <!-- 돋보기 안 점 3개 -->
            <circle cx="72" cy="64" r="1.6" fill="var(--ink-4)"/>
            <circle cx="78" cy="64" r="1.6" fill="var(--ink-4)"/>
            <circle cx="84" cy="64" r="1.6" fill="var(--ink-4)"/>
          </svg>
        </div>
        <p class="empty__title">검색 결과가 없습니다</p>
        <p class="empty__sub">필터 조건을 줄이거나 검색어를 변경해 보세요.</p>
        <button class="btn btn--ghost" id="emptyResetBtn" type="button">필터 초기화</button>
      </div>

    </section>

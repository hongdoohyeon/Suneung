<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="description" content="수능, LEET, MEET 기출문제를 한 곳에서. 학년도·과목별로 빠르게 찾아보세요." />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="favicon.svg" />

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <title>기출자료실 — 수능 · LEET · MEET</title>
  <link rel="stylesheet" href="style.css?v=20260429h" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="site-header">
    <div class="container site-header__inner">
      <a href="index.html" class="brand">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="22" height="22" fill="none">
            <rect width="32" height="32" rx="7" fill="currentColor"/>
            <rect x="8" y="10.5" width="16" height="2" rx="1" fill="#fff"/>
            <rect x="8" y="15"   width="16" height="2" rx="1" fill="#fff" opacity=".6"/>
            <rect x="8" y="19.5" width="10" height="2" rx="1" fill="#fff" opacity=".32"/>
          </svg>
        </span>
        <span class="brand__name">기출자료실</span>
      </a>

      <nav class="header-nav">
        <a href="archive.html" class="is-active">기출 검색</a>
        <a href="gradecut.html">등급컷</a>
      </nav>
    </div>
  </header>

  <!-- ── Curriculum Nav ─────────────────────────────────── -->
  <nav class="curriculum-nav" id="curriculumTabs" aria-label="시험 선택">
    <div class="container curriculum-nav__inner">

      <div class="nav-group">
        <span class="nav-group__label">수능</span>
        <div class="nav-group__tabs">
          <button class="nav-tab" data-curriculum="예비">
            <span class="nav-tab__title">28학년도 예비</span>
            <span class="nav-tab__sub">2022 개정</span>
          </button>
          <button class="nav-tab is-active" data-curriculum="2015">
            <span class="nav-tab__title">2015 개정</span>
            <span class="nav-tab__sub">2027~2022</span>
          </button>
          <button class="nav-tab" data-curriculum="2009">
            <span class="nav-tab__title">2009 개정</span>
            <span class="nav-tab__sub">2021~2014</span>
          </button>
        </div>
      </div>

      <div class="nav-sep" aria-hidden="true"></div>

      <div class="nav-group">
        <span class="nav-group__label">사관·경찰</span>
        <div class="nav-group__tabs">
          <button class="nav-tab" data-curriculum="사관">
            <span class="nav-tab__title">사관학교</span>
            <span class="nav-tab__sub">1차 시험</span>
          </button>
          <button class="nav-tab" data-curriculum="경찰대">
            <span class="nav-tab__title">경찰대학</span>
            <span class="nav-tab__sub">1차 시험</span>
          </button>
        </div>
      </div>

      <div class="nav-sep" aria-hidden="true"></div>

      <div class="nav-group">
        <span class="nav-group__label">대입적성</span>
        <div class="nav-group__tabs">
          <button class="nav-tab" data-curriculum="LEET">
            <span class="nav-tab__title">리트</span>
            <span class="nav-tab__sub">LEET</span>
          </button>
          <button class="nav-tab" data-curriculum="MEET">
            <span class="nav-tab__title">미트</span>
            <span class="nav-tab__sub">MEET</span>
          </button>
        </div>
      </div>

    </div>
  </nav>

  <!-- ── Main ───────────────────────────────────────────── -->
  <main class="container main">

    <!-- Sidebar / Mobile Bottom Sheet -->
    <aside class="filter" id="filterPanel" aria-label="필터" role="region">

      <!-- 모바일 바텀시트 핸들 + 닫기 (데스크톱에서는 숨김) -->
      <div class="filter__sheet-head" aria-hidden="false">
        <span class="filter__sheet-handle" aria-hidden="true"></span>
        <h2 class="filter__sheet-title">필터</h2>
        <button class="filter__sheet-close" id="filterSheetClose"
                type="button" aria-label="필터 닫기">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6"  x2="6"  y2="18"/>
            <line x1="6"  y1="6"  x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="filter__section" id="typeGroupBlock">
        <h3 class="filter__title">시험</h3>
        <div class="pill-row" id="typeGroupFilter"></div>
        <div class="subtype-row" id="subtypeRow">
          <div class="subtype-row__inner">
            <div class="pill-row" id="typeFilter"></div>
          </div>
        </div>
      </div>

      <div class="filter__section">
        <div class="filter__title-row">
          <h3 class="filter__title" id="yearLabel">학년도</h3>
          <span class="filter__hint" id="yearNote"></span>
        </div>
        <div class="year-row" id="yearFilter"></div>
      </div>

      <div class="filter__section">
        <h3 class="filter__title">영역</h3>
        <div id="subjectFilter"></div>
      </div>

      <!-- 모바일 시트 하단 적용 버튼 -->
      <div class="filter__sheet-actions">
        <button class="btn btn--ghost" id="filterSheetReset" type="button">초기화</button>
        <button class="btn btn--primary" id="filterSheetApply" type="button">결과 보기</button>
      </div>

    </aside>

    <!-- Backdrop (모바일 시트 전용) -->
    <div class="filter-backdrop" id="filterBackdrop" hidden></div>

    <!-- Content -->
    <section class="content">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search">
          <svg class="search__icon" width="16" height="16" viewBox="0 0 20 20" fill="none">
            <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.6"/>
            <path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <input id="searchInput" type="text" placeholder="과목·연도로 검색" autocomplete="off" />
          <button id="clearSearch" class="search__clear" style="display:none" aria-label="검색 지우기">×</button>
        </div>
        <button class="btn btn--ghost filter-toggle-inline" id="filterToggleInline"
                aria-label="필터 열기" aria-expanded="false" type="button">필터</button>
        <div class="toolbar__right">
          <span id="resultCount" class="count"></span>
          <button class="btn-text" id="resetBtn">초기화</button>
        </div>
      </div>

      <!-- Active Tags -->
      <div id="activeTags" class="active-tags"></div>

      <!-- Skeleton -->
      <div id="skeleton" class="grid">
        <div class="skel-card"></div><div class="skel-card"></div>
        <div class="skel-card"></div><div class="skel-card"></div>
        <div class="skel-card"></div><div class="skel-card"></div>
      </div>

      <!-- Cards -->
      <div id="cardsGrid" class="grid" style="display:none;"></div>

      <!-- Load more -->
      <div id="loadMoreWrap" class="load-more" style="display:none;">
        <div class="load-more__progress" id="loadProgress"></div>
        <button id="loadMoreBtn" class="btn">더 보기</button>
        <span id="loadMoreInfo" class="load-more__info"></span>
      </div>

      <!-- Empty -->
      <div id="emptyState" class="empty" style="display:none;" role="status" aria-live="polite">
        <div class="empty__illu" aria-hidden="true">
          <svg width="120" height="96" viewBox="0 0 120 96" fill="none">
            <!-- 빈 문서 배경 -->
            <rect x="22" y="14" width="58" height="72" rx="6"
                  fill="var(--surface-2)" stroke="var(--line-strong)" stroke-width="1.4"/>
            <line x1="32" y1="32" x2="68" y2="32" stroke="var(--ink-6)" stroke-width="1.6" stroke-linecap="round"/>
            <line x1="32" y1="42" x2="62" y2="42" stroke="var(--ink-6)" stroke-width="1.6" stroke-linecap="round"/>
            <line x1="32" y1="52" x2="58" y2="52" stroke="var(--ink-6)" stroke-width="1.6" stroke-linecap="round"/>
            <!-- 돋보기 -->
            <circle cx="78" cy="64" r="18"
                    fill="var(--surface)" stroke="var(--ink-3)" stroke-width="2.2"/>
            <line x1="91" y1="77" x2="104" y2="90"
                  stroke="var(--ink-3)" stroke-width="3" stroke-linecap="round"/>
            <!-- 돋보기 안 점 3개 -->
            <circle cx="72" cy="64" r="1.6" fill="var(--ink-4)"/>
            <circle cx="78" cy="64" r="1.6" fill="var(--ink-4)"/>
            <circle cx="84" cy="64" r="1.6" fill="var(--ink-4)"/>
          </svg>
        </div>
        <p class="empty__title">검색 결과가 없습니다</p>
        <p class="empty__sub">필터 조건을 줄이거나 검색어를 변경해 보세요.</p>
        <button class="btn btn--ghost" id="emptyResetBtn" type="button">필터 초기화</button>
      </div>

    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>출처 · 한국교육과정평가원 · 법학전문대학원협의회 · 의·치학교육입문검사 관리위원회</p>
      <p class="site-footer__sub">저작권은 각 발행기관에 있으며 교육 목적으로만 이용할 수 있습니다.</p>
    </div>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>

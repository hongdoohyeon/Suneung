<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="description" content="등급컷 계산기 — 한 시험 전체 점수를 입력하면 영역별 등급과 종합 백분위를 해체해 보여드립니다. 수능·평가원·교육청·LEET·MEET 지원." />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="favicon.svg" />

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <title>등급컷 계산기 — 기출해체분석기</title>
  <link rel="stylesheet" href="style.css?v=20260429o" />
</head>
<body class="page-gradecut">

  <header class="site-header">
    <div class="container site-header__inner">
      <a href="index.html" class="brand">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="22" height="22" fill="none">
            <rect width="32" height="32" rx="7" fill="currentColor"/>
            <rect x="8"  y="14" width="3" height="11" rx="1" fill="#fff" opacity=".45"/>
            <rect x="14" y="9"  width="3" height="16" rx="1" fill="#fff" opacity=".7"/>
            <rect x="20" y="6"  width="3" height="19" rx="1" fill="#fff"/>
          </svg>
        </span>
        <span class="brand__name">기출해체분석기</span>
      </a>
      <nav class="header-nav">
        <a href="archive.html">기출 검색</a>
        <a href="gradecut.html" class="is-active">등급컷</a>
      </nav>
      <button class="icon-btn" id="filterToggle" aria-label="시험 선택 열기" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="4"  y1="6"  x2="20" y2="6"/>
          <line x1="4"  y1="12" x2="14" y2="12"/>
          <line x1="4"  y1="18" x2="9"  y2="18"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="container main">

    <!-- 사이드바 — 교육과정/학년도/시험 -->
    <aside class="filter" id="filterPanel">

      <div class="filter__section">
        <h3 class="filter__title">교육과정</h3>
        <div class="pill-row" id="gcCurrPills"></div>
      </div>

      <div class="filter__section">
        <h3 class="filter__title">학년도</h3>
        <div class="year-row" id="gcYearPills"></div>
      </div>

      <div class="filter__section">
        <h3 class="filter__title">시험</h3>
        <div class="pill-row" id="gcTypePills"></div>
      </div>

    </aside>

    <!-- 메인 — 영역별 점수 입력 + 종합 -->
    <section class="content">

      <!-- 시험 미선택 안내 -->
      <div class="gc-empty" id="gcEmpty">
        <div class="gc-empty__icon">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M9 11l3 3L22 4"/>
          </svg>
        </div>
        <p class="gc-empty__title">시험을 선택해 주세요</p>
        <p class="gc-empty__sub">교육과정 → 학년도 → 시험을 고르면 영역별 점수 입력란이 나타납니다.</p>
        <button class="btn gc-empty__cta" id="gcEmptyCta" type="button">시험 선택하기</button>
      </div>

      <!-- 시험 선택 후 — 영역별 카드들 -->
      <div class="gc-exam-wrap" id="gcExamWrap" style="display:none;">

        <header class="gc-exam-head">
          <h2 class="gc-exam-title" id="gcExamTitle">— 시험 —</h2>
          <div class="gc-exam-head__actions">
            <button class="btn btn--ghost gc-change-btn" id="gcChangeBtn" type="button">시험 변경</button>
            <button class="gc-reset-btn" id="gcResetBtn" type="button">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M3 12a9 9 0 1 0 9-9c-2.5 0-4.8 1-6.6 2.6L3 8"/>
                <polyline points="3 3 3 8 8 8"/>
              </svg>
              점수 초기화
            </button>
          </div>
        </header>

        <div class="subj-grid" id="gcSubjGrid"></div>

        <!-- 종합 분석 -->
        <div class="total-card" id="gcTotalCard" style="display:none;">
          <header class="total-card__head">
            <h3 class="total-card__title">종합 분석</h3>
            <span class="total-card__hint" id="gcTotalHint">— 영역 입력 —</span>
          </header>

          <div class="total-stats">
            <div class="total-stat">
              <span class="total-stat__num" id="gcAvgGrade">—</span>
              <span class="total-stat__label">평균 등급</span>
            </div>
            <div class="total-stat__divider"></div>
            <div class="total-stat">
              <span class="total-stat__num" id="gcAvgPct">—</span>
              <span class="total-stat__label">평균 상위 백분율</span>
            </div>
          </div>

          <div class="total-bars" id="gcTotalBars"></div>
        </div>

      </div>

    </section>
  </main>

  <script type="module" src="gradecut.js"></script>
</body>
</html>
